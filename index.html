<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChipVocab - Luyện Thi TOEIC</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f3f4f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            text-align: center;
            width: 100%;
            max-width: 500px;
        }
        h2 {
            color: #1f2937;
            margin-bottom: 20px;
        }
        .vietnamese-word {
            font-size: 24px;
            font-weight: bold;
            color: #2563eb;
            margin-bottom: 20px;
        }
        input[type="text"] {
            width: 80%;
            padding: 12px;
            font-size: 16px;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            margin-bottom: 15px;
            outline: none;
            transition: border-color 0.3s;
        }
        input[type="text"]:focus {
            border-color: #2563eb;
        }
        button {
            background-color: #2563eb;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.3s;
            margin: 5px;
        }
        button:hover {
            background-color: #1d4ed8;
        }
        .message {
            margin-top: 15px;
            font-weight: bold;
            min-height: 24px;
            font-size: 15px;
        }
        .correct { color: #16a34a; }
        .incorrect { color: #dc2626; }
        .stats {
            margin-top: 20px;
            font-size: 14px;
            color: #6b7280;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Luyện Gõ Từ Vựng TOEIC</h2>
    <div class="vietnamese-word" id="vi-word">Đang tải...</div>
    
    <input type="text" id="en-input" placeholder="Nhập tiếng Anh vào đây..." autocomplete="off">
    <br>
    <button onclick="checkAnswer()">Kiểm tra</button>
    
    <div class="message" id="message"></div>
    <div class="stats" id="stats"></div>
</div>

<script>
    // --- TỔNG HỢP TOÀN BỘ TỪ VỰNG PART 6 ---
    const vocabList = [
        // Part 6 - Text List
        { vi: "đảm bảo", en: ["assure"] },
        { vi: "thông báo", en: ["notify", "announce"] },
        { vi: "tuân thủ", en: ["comply with", "follow", "abide by"] },
        { vi: "ưu tiên", en: ["prioritise", "prioritize"] },
        { vi: "làm hài lòng, thoả mãn", en: ["satisfy", "fulfill"] },
        { vi: "quy trình, thủ tục", en: ["procedure"] },
        { vi: "chuyên môn", en: ["expertise"] },
        { vi: "quan chức", en: ["officials"] },
        { vi: "sự đặt trước", en: ["reservation"] },
        { vi: "sự cải tạo", en: ["renovation"] },
        { vi: "miễn phí", en: ["complimentary", "free"] },
        { vi: "đầy đủ, tổng quát", en: ["comprehensive"] },
        { vi: "sở hữu", en: ["possess", "have"] },
        { vi: "xin tư vấn", en: ["consult"] },
        { vi: "linh hoạt", en: ["flexible"] },
        { vi: "được tham gia đông đủ", en: ["well-attended"] },
        { vi: "ngưng hoạt động", en: ["out of order"] },
        { vi: "tới hạn", en: ["to be due"] },
        { vi: "công việc, sự phân công, nhiệm vụ", en: ["assignment"] },
        { vi: "có tiềm năng", en: ["potential"] },
        { vi: "số dư tài khoản, số tiền còn lại", en: ["balance"] },
        { vi: "hào hứng, phấn khích", en: ["thrilled", "excited"] },

        // Part 6 - Hình ảnh
        { vi: "trì hoãn", en: ["postpone", "delay"] },
        { vi: "chỉ ra, thể hiện", en: ["indicated", "show"] },
        { vi: "mong đợi", en: ["anticipated", "expected"] },
        { vi: "đắt", en: ["expensive"] },
        { vi: "lặp lại", en: ["repetitive"] },
        { vi: "thú vị", en: ["appealing"] },
        { vi: "bất ngờ", en: ["surprising"] },
        { vi: "truy vấn kĩ thuật", en: ["technical query"] },
        { vi: "khởi động lại", en: ["reboot", "restart"] },
        { vi: "vị trí từ xa", en: ["remote location"] },
        { vi: "sớm nhất có thể", en: ["at your earliest convenience", "asap"] },
        { vi: "công năng", en: ["capabilities"] },
        { vi: "đơn mua sỉ", en: ["wholesale orders"] },
        { vi: "ưu đãi, giảm giá", en: ["offer", "deal", "discount"] },
        { vi: "gỗ óc chó", en: ["walnut wood"] },
        { vi: "tiền cọc, tiền gửi ngân hàng", en: ["deposit"] },
        { vi: "sơ yếu lý lịch", en: ["résumé", "cv", "resume"] },
        { vi: "đáp lại, phản hồi", en: ["in response to"] },
        { vi: "phù hợp", en: ["well suited"] },
        { vi: "nhiệt huyết", en: ["enthusiastic"] }
    ];

    // Hàm xáo trộn mảng ngẫu nhiên
    function shuffleArray(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
    }

    let currentIndex = 0;

    const viWordElement = document.getElementById('vi-word');
    const enInputElement = document.getElementById('en-input');
    const messageElement = document.getElementById('message');
    const statsElement = document.getElementById('stats');

    function loadWord() {
        if (currentIndex < vocabList.length) {
            viWordElement.textContent = vocabList[currentIndex].vi;
            enInputElement.value = '';
            messageElement.textContent = '';
            enInputElement.focus();
            updateStats();
        } else {
            viWordElement.textContent = "🎉 Chúc mừng bạn đã hoàn thành bộ từ vựng!";
            enInputElement.style.display = 'none';
            document.querySelector('button').style.display = 'none';
            messageElement.textContent = '';
        }
    }

    function checkAnswer() {
        const userAnswer = enInputElement.value.trim().toLowerCase();
        const correctAnswers = vocabList[currentIndex].en.map(ans => ans.trim().toLowerCase());

        if (correctAnswers.includes(userAnswer)) {
            messageElement.textContent = "✅ Chính xác!";
            messageElement.className = "message correct";
            currentIndex++;
            setTimeout(loadWord, 1000); 
        } else {
            messageElement.textContent = `❌ Sai rồi. Đáp án đúng: "${correctAnswers.join('" hoặc "')}"`;
            messageElement.className = "message incorrect";
        }
    }

    function updateStats() {
        statsElement.textContent = `Từ ${currentIndex + 1} / ${vocabList.length}`;
    }

    enInputElement.addEventListener("keypress", function(event) {
        if (event.key === "Enter") {
            event.preventDefault();
            checkAnswer();
        }
    });

    // Xáo trộn danh sách trước khi bắt đầu
    shuffleArray(vocabList);
    
    // Khởi tạo app
    loadWord();
</script>

</body>
</html>
