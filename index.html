<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luyện Tập Từ Vựng TOEIC - Tự Gõ Nghĩa</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f4f8;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .quiz-container {
            background-color: white;
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
            padding: 30px;
            width: 90%;
            max-width: 500px;
            text-align: center;
        }
        h2 {
            color: #2c3e50;
            margin-bottom: 5px;
        }
        .score-board {
            font-size: 16px;
            color: #7f8c8d;
            margin-bottom: 20px;
        }
        .question {
            font-size: 28px;
            font-weight: bold;
            color: #2980b9;
            margin: 20px 0;
            padding: 20px;
            background-color: #ecf0f1;
            border-radius: 8px;
        }
        .input-area {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 20px;
        }
        input[type="text"] {
            padding: 15px;
            font-size: 16px;
            border: 2px solid #bdc3c7;
            border-radius: 8px;
            outline: none;
            transition: border-color 0.2s;
        }
        input[type="text"]:focus {
            border-color: #3498db;
        }
        .btn {
            padding: 15px;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            border: none;
            font-weight: bold;
            transition: all 0.2s ease;
        }
        .check-btn {
            background-color: #2ecc71;
            color: white;
        }
        .check-btn:hover {
            background-color: #27ae60;
        }
        .next-btn {
            background-color: #3498db;
            color: white;
            display: none;
        }
        .next-btn:hover {
            background-color: #2980b9;
        }
        .feedback {
            font-size: 18px;
            font-weight: bold;
            margin: 15px 0;
            min-height: 25px;
        }
        .correct-text { color: #27ae60; }
        .wrong-text { color: #c0392b; }
        .hint {
            font-size: 14px;
            color: #7f8c8d;
            margin-top: -5px;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>

<div class="quiz-container">
    <h2>Luyện Từ Vựng (Gõ Nghĩa)</h2>
    <div class="score-board">Điểm: <span id="score">0</span> / <span id="total">0</span></div>
    
    <div class="question" id="word-display">Đang tải...</div>
    <div class="hint">Gõ tiếng Việt (có dấu hoặc không dấu đều được)</div>
    
    <div class="input-area">
        <input type="text" id="answer-input" placeholder="Nhập nghĩa tiếng Việt vào đây..." autocomplete="off">
        <button class="btn check-btn" id="check-btn" onclick="checkAnswer()">Kiểm tra</button>
        <button class="btn next-btn" id="next-btn" onclick="loadNextQuestion()">Câu tiếp theo ➔</button>
    </div>

    <div class="feedback" id="feedback"></div>
</div>

<script>
    const vocabList = [
        { en: "tenants", vi: "người thuê" },
        { en: "out of order", vi: "ngừng hoạt động" },
        { en: "apologize", vi: "xin lỗi" },
        { en: "property management team", vi: "đội quản lý tài sản" },
        { en: "attempt to", vi: "cố gắng" },
        { en: "be directed to", vi: "được hướng dẫn / chuyển đến" },
        { en: "tailored / be customed to", vi: "thiết kế riêng" },
        { en: "attention", vi: "dành sự chú ý" },
        { en: "measurement", vi: "số đo" },
        { en: "up front / before", vi: "trước" },
        { en: "assured", vi: "đảm bảo" },
        { en: "former", vi: "cũ / trước đây" },
        { en: "temporary (>< permanent)", vi: "tạm thời" },
        { en: "superb", vi: "tuyệt vời" },
        { en: "enclose / attached", vi: "đính kèm" },
        { en: "in advance", vi: "trước" },
        { en: "professional / specialists", vi: "chuyên gia" },
        { en: "practice", vi: "cơ sở" },
        { en: "procedures", vi: "quy trình / thủ tục" },
        { en: "share a passion for", vi: "có chung niềm đam mê" },
        { en: "initial / first", vi: "đầu tiên" }
    ];

    let currentQuestion = {};
    let score = 0;
    let totalAnswered = 0;

    // Hàm chuẩn hóa chuỗi (Xóa dấu tiếng Việt, đưa về chữ thường, xóa khoảng trắng thừa)
    function normalizeString(str) {
        if (!str) return "";
        str = str.toLowerCase().trim();
        str = str.replace(/à|á|ạ|ả|ã|â|ầ|ấ|ậ|ẩ|ẫ|ă|ằ|ắ|ặ|ẳ|ẵ/g, "a");
        str = str.replace(/è|é|ẹ|ẻ|ẽ|ê|ề|ế|ệ|ể|ễ/g, "e");
        str = str.replace(/ì|í|ị|ỉ|ĩ/g, "i");
        str = str.replace(/ò|ó|ọ|ỏ|õ|ô|ồ|ố|ộ|ổ|ỗ|ơ|ờ|ớ|ợ|ở|ỡ/g, "o");
        str = str.replace(/ù|ú|ụ|ủ|ũ|ư|ừ|ứ|ự|ử|ữ/g, "u");
        str = str.replace(/ỳ|ý|ỵ|ỷ|ỹ/g, "y");
        str = str.replace(/đ/g, "d");
        // Xóa các ký tự đặc biệt, chỉ giữ lại chữ cái và số
        str = str.replace(/[^a-z0-9 ]/g, "");
        // Gom nhiều khoảng trắng thành 1
        str = str.replace(/\s+/g, " ");
        return str;
    }

    // Bắt sự kiện nhấn Enter trong ô input
    document.getElementById("answer-input").addEventListener("keypress", function(event) {
        if (event.key === "Enter") {
            event.preventDefault();
            if (document.getElementById("check-btn").style.display !== "none") {
                checkAnswer();
            } else {
                loadNextQuestion();
            }
        }
    });

    function loadNextQuestion() {
        // Cài đặt lại UI
        document.getElementById("check-btn").style.display = "block";
        document.getElementById("next-btn").style.display = "none";
        document.getElementById("feedback").innerHTML = "";
        
        let inputField = document.getElementById("answer-input");
        inputField.value = "";
        inputField.disabled = false;
        inputField.focus(); // Tự động trỏ chuột vào ô nhập
        
        // Chọn câu hỏi ngẫu nhiên
        let randomIndex = Math.floor(Math.random() * vocabList.length);
        currentQuestion = vocabList[randomIndex];
        
        document.getElementById("word-display").innerText = currentQuestion.en;
    }

    function checkAnswer() {
        let userInput = document.getElementById("answer-input").value;
        if (userInput.trim() === "") return; // Không làm gì nếu chưa nhập

        let normalizedInput = normalizeString(userInput);
        
        // Cắt các nghĩa khác nhau nếu có dấu gạch chéo '/' (VD: quy trình / thủ tục)
        let correctAnswers = currentQuestion.vi.split('/');
        let isCorrect = false;

        for (let i = 0; i < correctAnswers.length; i++) {
            let normalizedCorrect = normalizeString(correctAnswers[i]);
            if (normalizedInput === normalizedCorrect) {
                isCorrect = true;
                break;
            }
        }

        totalAnswered++;
        let feedbackEl = document.getElementById("feedback");

        if (isCorrect) {
            score++;
            feedbackEl.innerHTML = `<span class="correct-text">✔ Chính xác!</span>`;
        } else {
            feedbackEl.innerHTML = `<span class="wrong-text">✘ Sai rồi. Đáp án đúng là: <b>${currentQuestion.vi}</b></span>`;
        }

        // Cập nhật UI
        document.getElementById("score").innerText = score;
        document.getElementById("total").innerText = totalAnswered;
        
        document.getElementById("answer-input").disabled = true;
        document.getElementById("check-btn").style.display = "none";
        document.getElementById("next-btn").style.display = "block";
        document.getElementById("next-btn").focus(); // Trỏ chuột vào nút Next để bấm Enter cho tiện
    }

    // Khởi chạy
    window.onload = loadNextQuestion;
</script>

</body>
</html>
