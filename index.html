<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trắc Nghiệm Từ Vựng TOEIC</title>
    <style>
        :root {
            --primary: #4F46E5;
            --primary-hover: #4338CA;
            --success: #10B981;
            --danger: #EF4444;
            --bg: #F3F4F6;
            --text: #1F2937;
            --card-bg: #FFFFFF;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 20px;
        }
        .container {
            width: 100%;
            max-width: 500px;
            background: var(--card-bg);
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            box-sizing: border-box;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid var(--bg);
        }
        .score {
            font-weight: bold;
            color: var(--success);
            font-size: 18px;
        }
        .toggle-btn {
            background-color: #E5E7EB;
            color: #374151;
            border: none;
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            transition: background 0.3s;
        }
        .toggle-btn:hover { background-color: #D1D5DB; }
        
        .question-box {
            text-align: center;
            margin-bottom: 24px;
        }
        .question-title {
            font-size: 16px;
            color: #6B7280;
            margin-bottom: 8px;
        }
        .question-word {
            font-size: 28px;
            font-weight: bold;
            color: var(--primary);
        }
        .note {
            font-size: 14px;
            color: #9CA3AF;
            margin-top: 4px;
        }

        .options-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .option-btn {
            background-color: var(--bg);
            border: 2px solid transparent;
            padding: 16px;
            border-radius: 8px;
            font-size: 16px;
            color: var(--text);
            cursor: pointer;
            transition: all 0.2s;
            text-align: left;
        }
        .option-btn:hover:not(:disabled) {
            background-color: #E0E7FF;
            border-color: #C7D2FE;
        }
        .option-btn:disabled {
            cursor: not-allowed;
        }
        /* States */
        .option-btn.correct {
            background-color: #D1FAE5;
            border-color: var(--success);
            color: #065F46;
        }
        .option-btn.wrong {
            background-color: #FEE2E2;
            border-color: var(--danger);
            color: #991B1B;
        }

        .action-area {
            margin-top: 24px;
            text-align: center;
            min-height: 50px;
        }
        .next-btn {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            display: none; /* Ẩn đi cho đến khi chọn đáp án */
            width: 100%;
        }
        .next-btn:hover { background-color: var(--primary-hover); }

        .result-screen {
            display: none;
            text-align: center;
        }
        .result-screen h2 { margin-top: 0; color: var(--primary); }
    </style>
</head>
<body>

    <div class="container" id="quiz-container">
        <div class="header">
            <span class="score">Điểm: <span id="score-text">0/0</span></span>
            <button class="toggle-btn" onclick="toggleMode()" id="mode-btn">Chế độ: Anh ➔ Việt</button>
        </div>

        <div class="question-box">
            <div class="question-title" id="q-title">Nghĩa của từ này là gì?</div>
            <div class="question-word" id="q-word">Word</div>
            <div class="note" id="q-note"></div>
        </div>

        <div class="options-grid" id="options-area">
            </div>

        <div class="action-area">
            <button class="next-btn" id="next-btn" onclick="nextQuestion()">Câu tiếp theo ➔</button>
        </div>
    </div>

    <div class="container result-screen" id="result-container">
        <h2>🎉 Hoàn thành!</h2>
        <p style="font-size: 18px;">Bạn đã trả lời đúng:</p>
        <p style="font-size: 36px; font-weight: bold; color: var(--success); margin: 10px 0;" id="final-score">0/0</p>
        <button class="next-btn" style="display: inline-block; margin-top: 20px;" onclick="startQuiz()">Làm lại từ đầu 🔄</button>
    </div>

    <script>
        const vocabData = [
            { en: "tenants", vi: "người thuê" },
            { en: "out of order", vi: "ngừng hoạt động" },
            { en: "apologize", vi: "xin lỗi", note: "(v) xin lỗi => apology (n)" },
            { en: "property management team", vi: "đội quản lý tài sản" },
            { en: "attempt to", vi: "cố gắng" },
            { en: "be directed to", vi: "được chuyển đến" },
            { en: "tailored", vi: "thiết kế riêng, tinh chỉnh", note: "(v) = be customized to" },
            { en: "gave me his full attention", vi: "dành toàn bộ sự chú ý" },
            { en: "measurements", vi: "số đo" },
            { en: "up front", vi: "trước", note: "= before" },
            { en: "assured", vi: "đảm bảo" },
            { en: "former", vi: "trước đó, cựu" },
            { en: "temporary", vi: "tạm thời", note: ">< permanent" },
            { en: "superb", vi: "tuyệt vời" },
            { en: "enclosed", vi: "đính kèm", note: "= attached" },
            { en: "in advance", vi: "trước" },
            { en: "professionals", vi: "chuyên gia" },
            { en: "practice", vi: "cơ sở (phòng khám/luật)" },
            { en: "specialists", vi: "chuyên gia", note: "= professionals" },
            { en: "comprehensive", vi: "đầy đủ, toàn diện", note: "= full" },
            { en: "procedures", vi: "quy trình, thủ tục" },
            { en: "share a passion for", vi: "có chung niềm đam mê" },
            { en: "initial", vi: "ban đầu", note: "= first" }
        ];

        let currentQuestions = [];
        let currentQuestionIndex = 0;
        let score = 0;
        let isEnToVi = true; // true: Anh->Việt, false: Việt->Anh

        const qWord = document.getElementById('q-word');
        const qTitle = document.getElementById('q-title');
        const qNote = document.getElementById('q-note');
        const optionsArea = document.getElementById('options-area');
        const nextBtn = document.getElementById('next-btn');
        const scoreText = document.getElementById('score-text');
        const modeBtn = document.getElementById('mode-btn');
        const quizContainer = document.getElementById('quiz-container');
        const resultContainer = document.getElementById('result-container');

        // Hàm trộn mảng ngẫu nhiên (Fisher-Yates)
        function shuffleArray(array) {
            let arr = [...array];
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        function toggleMode() {
            isEnToVi = !isEnToVi;
            modeBtn.textContent = isEnToVi ? "Chế độ: Anh ➔ Việt" : "Chế độ: Việt ➔ Anh";
            startQuiz(); // Bắt đầu lại khi đổi chế độ
        }

        function startQuiz() {
            currentQuestions = shuffleArray(vocabData);
            currentQuestionIndex = 0;
            score = 0;
            quizContainer.style.display = 'block';
            resultContainer.style.display = 'none';
            updateScore();
            loadQuestion();
        }

        function loadQuestion() {
            nextBtn.style.display = 'none';
            optionsArea.innerHTML = '';
            
            const currentItem = currentQuestions[currentQuestionIndex];
            
            // Set câu hỏi
            if (isEnToVi) {
                qTitle.textContent = "Chọn nghĩa tiếng Việt của:";
                qWord.textContent = currentItem.en;
            } else {
                qTitle.textContent = "Chọn từ tiếng Anh có nghĩa là:";
                qWord.textContent = currentItem.vi;
            }
            
            // Hiện note nếu có (chỉ hiện sau khi trả lời, hoặc hiện luôn tuỳ bạn. Ở đây cho ẩn tạm, sau khi click mới hiện note)
            qNote.textContent = ""; 

            // Tạo danh sách đáp án
            let correctAnswer = isEnToVi ? currentItem.vi : currentItem.en;
            let options = [correctAnswer];

            // Lấy 3 đáp án sai ngẫu nhiên
            let distractors = vocabData.filter(item => item.en !== currentItem.en);
            distractors = shuffleArray(distractors);
            
            for(let i = 0; i < 3; i++) {
                if (distractors[i]) {
                    options.push(isEnToVi ? distractors[i].vi : distractors[i].en);
                }
            }

            // Trộn 4 đáp án
            options = shuffleArray(options);

            // Render nút đáp án
            options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.textContent = opt;
                btn.onclick = () => checkAnswer(btn, opt, correctAnswer, currentItem.note);
                optionsArea.appendChild(btn);
            });
        }

        function checkAnswer(selectedBtn, selectedText, correctText, note) {
            // Vô hiệu hóa tất cả các nút
            const allBtns = optionsArea.querySelectorAll('.option-btn');
            allBtns.forEach(btn => btn.disabled = true);

            // Kiểm tra đúng sai
            if (selectedText === correctText) {
                selectedBtn.classList.add('correct');
                score++;
            } else {
                selectedBtn.classList.add('wrong');
                // Tìm nút có đáp án đúng và bôi xanh
                allBtns.forEach(btn => {
                    if (btn.textContent === correctText) {
                        btn.classList.add('correct');
                    }
                });
            }

            // Hiện chú thích (note) nếu từ đó có
            if (note) {
                qNote.textContent = note;
            }

            updateScore();
            nextBtn.style.display = 'block';
        }

        function nextQuestion() {
            currentQuestionIndex++;
            if (currentQuestionIndex < currentQuestions.length) {
                loadQuestion();
            } else {
                showResult();
            }
        }

        function updateScore() {
            scoreText.textContent = `${score}/${currentQuestions.length}`;
        }

        function showResult() {
            quizContainer.style.display = 'none';
            resultContainer.style.display = 'block';
            document.getElementById('final-score').textContent = `${score} / ${currentQuestions.length}`;
        }

        // Bắt đầu ngay khi tải trang
        startQuiz();
    </script>
</body>
</html>
