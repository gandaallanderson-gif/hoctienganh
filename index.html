<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChipVocab - Luyện Thi TOEIC</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f3f4f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            text-align: center;
            width: 100%;
            max-width: 450px;
        }
        h2 {
            color: #1f2937;
            margin-bottom: 20px;
        }
        .vietnamese-word {
            font-size: 24px;
            font-weight: bold;
            color: #2563eb;
            margin-bottom: 20px;
        }
        input[type="text"] {
            width: 80%;
            padding: 12px;
            font-size: 16px;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            margin-bottom: 15px;
            outline: none;
            transition: border-color 0.3s;
        }
        input[type="text"]:focus {
            border-color: #2563eb;
        }
        button {
            background-color: #2563eb;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        button:hover {
            background-color: #1d4ed8;
        }
        .message {
            margin-top: 15px;
            font-weight: bold;
            min-height: 24px;
            font-size: 15px;
        }
        .correct { color: #16a34a; }
        .incorrect { color: #dc2626; }
        .stats {
            margin-top: 20px;
            font-size: 14px;
            color: #6b7280;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Luyện Gõ Từ Vựng TOEIC</h2>
    <div class="vietnamese-word" id="vi-word">Đang tải...</div>
    
    <input type="text" id="en-input" placeholder="Nhập tiếng Anh vào đây..." autocomplete="off">
    <br>
    <button onclick="checkAnswer()">Kiểm tra</button>
    
    <div class="message" id="message"></div>
    <div class="stats" id="stats"></div>
</div>

<script>
    // Danh sách từ vựng đã được nâng cấp để hỗ trợ nhiều đáp án (từ đồng nghĩa)
    const vocabList = [
        { vi: "nâng một số đồ nội thất", en: ["lifting some furniture"] },
        { vi: "khởi động động cơ", en: ["starting an engine"] },
        { vi: "rèm cửa", en: ["curtains", "blinds"] },
        { vi: "đặt nằm lên", en: ["laid"] },
        { vi: "tụ tập", en: ["gathered"] },
        { vi: "với tay vào", en: ["reaching into "] },
        { vi: "xếp hàng", en: ["waiting in a line", "standing in a line"] },
        { vi: "dẫn đoàn du lịch", en: ["leading a tour group"] },
        { vi: "mở máy tính tiền", en: ["opening a cash register"] },
        { vi: "cúi xuống", en: ["bending over "] },
        { vi: "một chồng gạch", en: ["a stack of bricks"] },
        { vi: "tay vịn, lan can", en: ["handrail"] },
        { vi: "ghế bành", en: ["armchair"] },
        { vi: "tài liệu đọc", en: ["reading materials"] },
        { vi: "được tưới nước", en: ["being watered"] },
        { vi: "được treo", en: ["hanging on"] },
        { vi: "điều chỉnh", en: ["adjusting"] },
        { vi: "kiểm tra", en: ["inspecting", "examine"] },
        { vi: "xe đẩy hàng", en: ["vending cart"] },
        { vi: "xe đồ ăn di động", en: ["mobile food stand"] },
        { vi: "vỉa hè", en: ["walkway", "sidewalk", "pavement"] },
        { vi: "dụng cụ nấu ăn", en: ["cooking utensils"] }
    ];

    let currentIndex = 0;

    const viWordElement = document.getElementById('vi-word');
    const enInputElement = document.getElementById('en-input');
    const messageElement = document.getElementById('message');
    const statsElement = document.getElementById('stats');

    function loadWord() {
        if (currentIndex < vocabList.length) {
            viWordElement.textContent = vocabList[currentIndex].vi;
            enInputElement.value = '';
            messageElement.textContent = '';
            enInputElement.focus();
            updateStats();
        } else {
            viWordElement.textContent = "🎉 Chúc mừng bạn đã hoàn thành!";
            enInputElement.style.display = 'none';
            document.querySelector('button').style.display = 'none';
            messageElement.textContent = '';
        }
    }

    function checkAnswer() {
        // Lấy câu trả lời của người dùng, loại bỏ khoảng trắng thừa và chuyển thành chữ thường
        const userAnswer = enInputElement.value.trim().toLowerCase();
        
        // Lấy mảng các đáp án đúng và chuyển tất cả thành chữ thường
        const correctAnswers = vocabList[currentIndex].en.map(ans => ans.toLowerCase());

        // Kiểm tra xem câu trả lời của người dùng có nằm trong mảng đáp án đúng không
        if (correctAnswers.includes(userAnswer)) {
            messageElement.textContent = "✅ Chính xác!";
            messageElement.className = "message correct";
            currentIndex++;
            setTimeout(loadWord, 1000); // Tự động chuyển từ sau 1 giây
        } else {
            // Nối các đáp án đúng lại với nhau bằng chữ "hoặc" để hiển thị cho người dùng
            messageElement.textContent = `❌ Sai rồi. Đáp án đúng: "${correctAnswers.join('" hoặc "')}"`;
            messageElement.className = "message incorrect";
        }
    }

    function updateStats() {
        statsElement.textContent = `Từ ${currentIndex + 1} / ${vocabList.length}`;
    }

    // Bắt sự kiện nhấn phím Enter để kiểm tra nhanh
    enInputElement.addEventListener("keypress", function(event) {
        if (event.key === "Enter") {
            event.preventDefault();
            checkAnswer();
        }
    });

    // Khởi tạo app
    loadWord();
</script>

</body>
</html>
